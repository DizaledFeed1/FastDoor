spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  security:
    remember-me:
      key: dev-remember-me-key
      PERSONAL_DATA_KEY: "12345678901234567890123456789012"

  boot:
    admin:
      client:
        enabled: false
#        url: http://localhost:9090/admin
#        instance:
#          service-url: http://localhost:8080
#        username: app
#        password: app


  jmx:
    enabled: false

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.web: DEBUG
    org.springframework.security.authentication: DEBUG
    org.springframework.security.web.authentication.rememberme: DEBUG
    org.springframework.security.web.authentication: DEBUG

sms:
  enabled: true
  url: "http://localhost:8080/stub/sms/send"
  project: "test"
  api-key: "123asx"

management:
  endpoints:
    jmx:
      exposure:
        exclude: "*"
